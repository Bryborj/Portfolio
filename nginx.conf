server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript image/svg+xml;

    # Handle Astro static routing & clean URLs
    location / {
        try_files $uri $uri/index.html $uri/ /404.html;
    }

    # Cache static assets (images, JS, CSS, fonts)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Custom 404 page generated by Astro
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
